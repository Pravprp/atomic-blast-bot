<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atomic Blast (Online)</title>
    <meta property="og:title" content="Atomic Blast" />
    <meta property="og:description" content="I challenge you to a multiplayer match!" />
    <meta property="og:image" content="https://raw.githubusercontent.com/Pravprp/atomic-blast-bot/refs/heads/main/Image.png" />
    
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; overflow: hidden; background-color: #000; color: white;
            touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
        }
        canvas { display: block; }
        button { cursor: pointer; border: none; outline: none; font-family: inherit; }

        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .flex-grow { flex-grow: 1; }
        .absolute { position: absolute; }
        .relative { position: relative; }
        .inset-0 { top: 0; left: 0; right: 0; bottom: 0; }
        .top-1\/2 { top: 50% !important; }
        .left-1\/2 { left: 50% !important; }
        .z-10 { z-index: 10; }
        .z-20 { z-index: 20; }
        .z-30 { z-index: 30; }
        .z-40 { z-index: 40; }
        .w-full { width: 100%; }
        .h-screen { height: 100vh; }
        .text-center { text-align: center; }
        .text-white { color: white; }
        .font-bold { font-weight: bold; }
        .uppercase { text-transform: uppercase; }

        .top-bar {
            height: 3.5rem; padding: 0 1rem; background-color: #111827;
            border-bottom: 1px solid #1f2937; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .game-title {
            font-size: 1.25rem; font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.25rem 0.75rem; border-radius: 0.25rem; font-size: 0.875rem;
            color: white; transition: all 0.2s;
        }

        .control-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.2); }
        .control-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .opacity-70 { opacity: 0.7; }
        .opacity-100 { opacity: 1; }
        .bg-blue-600 { background-color: #2563eb !important; border-color: #3b82f6 !important; }

        #game-container { background-color: #000; }

        .glass-panel {
            background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem; border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 24rem; width: 100%; margin: 1rem;
        }

        .circle-btn {
            width: 2.5rem; height: 2.5rem; border-radius: 50%; background-color: #374151;
            color: white; font-weight: bold; font-size: 1.25rem; display: flex;
            align-items: center; justify-content: center; transition: background-color 0.2s;
        }
        .circle-btn:hover { background-color: #4b5563; }
        #playerCountDisplay { font-family: monospace; font-size: 1.875rem; width: 3rem; color: #60a5fa; }

        .grid-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 0.75rem;
        }
        .grid-btn {
            border: 1px solid #444; background: #2a2a2a; color: #888; padding: 0.5rem;
            border-radius: 0.5rem; font-size: 0.875rem; transition: all 0.2s;
        }
        .grid-btn.active {
            background: #3b82f6; color: white; border-color: #3b82f6; font-weight: bold;
        }

        #startBtn {
            padding: 1rem; background: linear-gradient(to right, #2563eb, #9333ea);
            border-radius: 0.75rem; font-size: 1.125rem; font-weight: bold; color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transition: transform 0.1s; margin-top: 10px;
        }
        #startBtn:hover { transform: scale(1.02); }
        #startBtn:active { transform: scale(0.95); }

        .label-text {
            display: block; color: #9ca3af; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.5rem;
        }

        #winnerOverlay { background: rgba(0, 0, 0, 0.9); }
        #winnerIcon {
            width: 6rem; height: 6rem; border-radius: 50%; margin: 0 auto 1rem auto;
            border: 4px solid white; display: flex; align-items: center; justify-content: center;
            background: #1f2937; font-size: 2.25rem;
        }
        #winnerText { font-size: 2.25rem; font-weight: 900; margin-bottom: 0.5rem; }

        #eliminationPopup {
            background: rgba(17, 24, 39, 0.95); border: 2px solid white; padding: 1.5rem 2rem;
            border-radius: 1rem; min-width: 250px; pointer-events: none;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transform: translate(-50%, -50%);
        }

        @keyframes fadeOutScale {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.8); }
            10% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -60%) scale(0.9); }
        }
        .animate-elimination { animation: fadeOutScale 1.0s ease-out forwards; }
    </style>
</head>

<body>

    <div class="top-bar flex items-center justify-between z-10 relative">
        <h1 class="game-title">Atomic Blast</h1>

        <div id="gameControls" class="flex gap-2 hidden">
            <button id="thickGridBtn" class="control-btn bg-blue-600 text-white opacity-100">
                Bold Grid
            </button>
            <button id="undoBtn" class="control-btn flex items-center gap-2" disabled>
                <span>↩</span> Undo
            </button>
        </div>
    </div>

    <div class="flex-grow relative flex items-center justify-center" id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="turnIndicator" class="absolute z-10 hidden flex items-center justify-center" 
             style="bottom: 2rem; padding: 0.75rem 2rem; border-radius: 2rem; font-weight: 900; letter-spacing: 2px; border: 2px solid white; pointer-events: none; transition: opacity 0.2s; font-size: 1.1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
            YOUR TURN
        </div>

        <div id="menuOverlay" class="absolute inset-0 flex items-center justify-center z-20"
            style="background-color: rgba(0,0,0,0.8);">
            <div class="glass-panel text-center">
                <h2 class="text-3xl font-bold mb-6 text-white"
                    style="letter-spacing: 0.05em; font-size: 1.875rem; margin-bottom: 1.5rem;">NEW GAME</h2>

                <p id="connectionStatus" style="color: #4ade80; font-weight: bold; margin-bottom: 0.5rem;">
                     🟢 Connected: 1
                </p>

                <div style="background: rgba(0,0,0,0.4); border-radius: 0.5rem; padding: 0.75rem; margin-bottom: 1.5rem; text-align: left; max-height: 120px; overflow-y: auto;">
                    <p style="color: #9ca3af; font-size: 0.75rem; font-weight: bold; margin-top: 0; margin-bottom: 0.5rem; text-transform: uppercase;">Players in Lobby</p>
                    <ul id="playerNamesList" style="list-style: none; padding: 0; margin: 0; font-size: 0.875rem;">
                        </ul>
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label class="label-text">Number of Players</label>
                    <div class="flex justify-center gap-4 items-center">
                        <button id="pDec" class="circle-btn">-</button>
                        <span id="playerCountDisplay">2</span>
                        <button id="pInc" class="circle-btn">+</button>
                    </div>
                </div>

                <div style="margin-bottom: 1rem;">
                    <label class="label-text">Grid Size</label>
                    <div class="grid-grid">
                        <button class="grid-btn" onclick="selectGrid(4,4, this)">4x4</button>
                        <button class="grid-btn" onclick="selectGrid(5,5, this)">5x5</button>
                        <button class="grid-btn active" onclick="selectGrid(6,6, this)">6x6</button>
                        <button class="grid-btn" onclick="selectGrid(8,6, this)">8x6</button>
                    </div>
                </div>

                <button id="startBtn" class="w-full">
                    PLAY
                </button>
            </div>
        </div>

        <div id="winnerOverlay" class="absolute inset-0 flex items-center justify-center z-30 hidden">
            <div class="text-center" style="padding: 1rem;">
                <div id="winnerIcon">
                    <span>👑</span>
                </div>
                <h2 id="winnerText">PLAYER 1 WINS!</h2>
                <p style="color: #9ca3af;">Tap anywhere to continue</p>
            </div>
        </div>

        <div id="eliminationPopup"
            class="absolute top-1/2 left-1/2 z-40 hidden flex flex-col items-center justify-center">
            <span style="font-size: 1.875rem; margin-bottom: 0.5rem;">💀</span>
            <h2 id="eliminationText"
                style="font-size: 1.5rem; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase;">RED
                ELIMINATED</h2>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const COLORS = [
            { name: 'RED', main: '#E6194B', glow: 'rgba(230, 25, 75, 0.8)' },
            { name: 'GREEN', main: '#3CB44B', glow: 'rgba(60, 180, 75, 0.8)' },
            { name: 'YELLOW', main: '#FFE119', glow: 'rgba(255, 225, 25, 0.8)' },
            { name: 'BLUE', main: '#4363D8', glow: 'rgba(67, 99, 216, 0.8)' },
            { name: 'ORANGE', main: '#F58231', glow: 'rgba(245, 130, 49, 0.8)' },
            { name: 'WHITE', main: '#FFFFFF', glow: 'rgba(255, 255, 255, 0.8)' },
            { name: 'PINK', main: '#FF69B4', glow: 'rgba(255, 105, 180, 0.8)' },
            { name: 'BROWN', main: '#D2691E', glow: 'rgba(210, 105, 30, 0.8)' }
        ];

        const ORB_RADIUS_RATIO = 0.25; 
        const CELL_PADDING = 2;
        const ANIMATION_SPEED = 0.15; 

        const socket = io();
        
        // Grab the hidden Room code AND Player Name from the URL
        const urlParams = new URLSearchParams(window.location.search);
        let ROOM_ID = urlParams.get('room');
        let PLAYER_NAME = urlParams.get('name') || "Player"; 

        if (!ROOM_ID) {
            ROOM_ID = Math.random().toString(36).substring(2, 8).toUpperCase();
            try { window.history.replaceState({}, '', `?room=${ROOM_ID}`); } catch (error) {}
        }

        let myPlayerId = null; 

        socket.on('connect', () => {
            // Send the name to the server when connecting
            socket.emit('joinRoom', { roomId: ROOM_ID, playerName: PLAYER_NAME });
        });

        socket.on('assignPlayerId', (id) => {
            myPlayerId = id;
            
            if (myPlayerId !== 0) {
                document.getElementById('startBtn').innerText = "WAITING FOR HOST...";
                document.getElementById('startBtn').disabled = true;

                document.getElementById('pDec').disabled = true;
                document.getElementById('pInc').disabled = true;
                document.getElementById('pDec').style.opacity = '0.5';
                document.getElementById('pInc').style.opacity = '0.5';
                document.getElementById('pDec').style.cursor = 'not-allowed';
                document.getElementById('pInc').style.cursor = 'not-allowed';

                const gridBtns = document.querySelectorAll('.grid-btn');
                gridBtns.forEach(btn => {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                });
            }
        });

        socket.on('gameStartedByHost', (data) => {
            nextRows = data.rows;
            nextCols = data.cols;
            numPlayers = data.numPlayers;
            
            document.getElementById('playerCountDisplay').innerText = numPlayers;
            startGame(true); 
        });

        socket.on('receiveMove', (data) => {
            processMove(data.r, data.c);
        });

        let connectedPlayersCount = 1; 
        let lobbyPlayers = []; // Store the full list of names
        
        // NEW: This listens for the Array of names, not just a raw number
        socket.on('lobbyPlayersUpdate', (playersArray) => {
            lobbyPlayers = playersArray;
            connectedPlayersCount = playersArray.length;
            
            const statusText = document.getElementById('connectionStatus');
            if (statusText) statusText.innerText = `🟢 Connected: ${connectedPlayersCount}`;

            // Draw the names in the list box!
            const listEl = document.getElementById('playerNamesList');
            if (listEl) {
                listEl.innerHTML = '';
                playersArray.forEach((p, index) => {
                    const li = document.createElement('li');
                    li.style.marginBottom = '0.4rem';
                    
                    if (index === 0) {
                        li.innerHTML = `⭐ <strong style="color:#facc15">${p.name}</strong> joined (Host)`;
                    } else {
                        li.innerHTML = `🎮 <strong style="color:#60a5fa">${p.name}</strong> joined`;
                    }
                    listEl.appendChild(li);
                });
            }

            if (myPlayerId === 0) {
                const startBtn = document.getElementById('startBtn');
                if (connectedPlayersCount < 2) {
                    startBtn.innerText = "WAITING FOR PLAYERS...";
                    startBtn.disabled = true;
                    startBtn.style.opacity = '0.5';
                } else {
                    startBtn.innerText = "PLAY";
                    startBtn.disabled = false;
                    startBtn.style.opacity = '1';
                }
            }
        }); 

        socket.on('roomFull', (maxLimit) => {
            const statusText = document.getElementById('connectionStatus');
            if (statusText) {
                statusText.innerText = `👁️ Spectating (Max ${maxLimit} Players)`;
                statusText.style.color = '#facc15'; 
            }

            myPlayerId = 'spectator'; 

            document.getElementById('pDec').disabled = true;
            document.getElementById('pInc').disabled = true;
            document.querySelectorAll('.grid-btn').forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
            });
            
            const startBtn = document.getElementById('startBtn');
            startBtn.innerText = "SPECTATE MATCH";
            startBtn.disabled = false; 
            startBtn.style.opacity = '1';
            
            startBtn.onclick = () => {
                startBtn.innerText = "LOADING BOARD...";
                socket.emit('requestGameState', ROOM_ID);
            };
        }); 

        socket.on('hostPleaseSendState', (spectatorSocketId) => {
            if (myPlayerId === 0) { 
                const currentState = {
                    rows: rows,
                    cols: cols,
                    numPlayers: numPlayers,
                    grid: grid,
                    players: players, // Contains the names!
                    currentPlayerIndex: currentPlayerIndex,
                    gameActive: gameActive,
                    currentSeconds: currentSeconds,
                    moveHistory: moveHistory 
                };
                socket.emit('hostRepliedWithState', { spectatorId: spectatorSocketId, state: currentState });
            }
        });

        socket.on('spectatorCatchUp', (state) => {
            if (state.gameActive) {
                rows = state.rows;
                cols = state.cols;
                numPlayers = state.numPlayers;
                grid = state.grid;
                players = state.players;
                currentPlayerIndex = state.currentPlayerIndex;
                gameActive = state.gameActive;
                currentSeconds = state.currentSeconds;
                moveHistory = state.moveHistory;

                handleResize(); 
                menuOverlay.classList.add('hidden'); 
                gameControls.classList.remove('hidden');
                updateTurnIndicator();
                
                clearInterval(turnTimer);
                turnTimer = setInterval(() => {
                    currentSeconds--;
                    updateTurnIndicator();
                }, 1000);
            } else {
                const startBtn = document.getElementById('startBtn');
                startBtn.innerText = "WAITING FOR HOST...";
                startBtn.disabled = true;
            }
        });

        socket.on('lobbyUpdated', (data) => {
            if (myPlayerId !== 0) {
                numPlayers = data.numPlayers;
                document.getElementById('playerCountDisplay').innerText = numPlayers;

                nextRows = data.rows;
                nextCols = data.cols;

                const btns = document.querySelectorAll('.grid-btn');
                btns.forEach(b => b.classList.remove('active'));
                
                if (nextRows === 4) btns[0].classList.add('active');
                if (nextRows === 5) btns[1].classList.add('active');
                if (nextRows === 6) btns[2].classList.add('active');
                if (nextRows === 8) btns[3].classList.add('active');
            }
        });

        socket.on('receiveUndo', () => {
            undoMove(true); 
        });

        socket.on('receiveTimeoutSkip', () => {
            processTimeout();
        });

        // -------------------------
        let canvas, ctx;
        let width, height;
        let rows = 6, cols = 6;
        let nextRows = 6, nextCols = 6;
        let isThickGrid = true; 

        let cellSize;
        let grid = [];
        let players = [];
        let numPlayers = 2;
        let currentPlayerIndex = 0;
        let isAnimating = false;
        let projectiles = []; 
        let gameActive = false;
        let totalMoves = 0;
        let checkWinCondition = false; 

        let turnTimer = null;
        let currentSeconds = 15;

        let moveHistory = [];
        let eliminationQueue = [];
        let isShowingElimination = false;

        const menuOverlay = document.getElementById('menuOverlay');
        const winnerOverlay = document.getElementById('winnerOverlay');
        const winnerText = document.getElementById('winnerText');
        const winnerIcon = document.getElementById('winnerIcon');
        const playerCountDisplay = document.getElementById('playerCountDisplay');
        const undoBtn = document.getElementById('undoBtn');
        const thickGridBtn = document.getElementById('thickGridBtn');
        const gameControls = document.getElementById('gameControls');
        const eliminationPopup = document.getElementById('eliminationPopup');
        const eliminationText = document.getElementById('eliminationText');

        window.onload = () => {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');

            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(err => {
                    console.log("Orientation lock not supported:", err);
                });
            }

            document.getElementById('pInc').onclick = () => updatePlayerCount(1);
            document.getElementById('pDec').onclick = () => updatePlayerCount(-1);
            document.getElementById('startBtn').onclick = startGame;
            undoBtn.onclick = undoMove;

            thickGridBtn.onclick = () => {
                isThickGrid = !isThickGrid;
                if (isThickGrid) {
                    thickGridBtn.classList.remove('opacity-70');
                    thickGridBtn.classList.add('bg-blue-600', 'text-white', 'opacity-100');
                } else {
                    thickGridBtn.classList.add('opacity-70');
                    thickGridBtn.classList.remove('bg-blue-600', 'text-white', 'opacity-100');
                }
            };

            winnerOverlay.onclick = resetGameMenu;

            window.addEventListener('resize', handleResize);
            canvas.addEventListener('mousedown', handleInput);
            canvas.addEventListener('touchstart', handleInput, { passive: false });

            handleResize();
            gameLoop();
        };

        function broadcastLobbyUpdate() {
            if (myPlayerId === 0 && socket) {
                socket.emit('lobbyUpdate', {
                    roomId: ROOM_ID,
                    numPlayers: numPlayers,
                    rows: nextRows,
                    cols: nextCols
                });
            }
        }
        
        window.selectGrid = function (r, c, btn) {
            nextRows = r;
            nextCols = c;
            updateGridButtons(btn);
            broadcastLobbyUpdate();
        }

        function updateGridButtons(activeBtn) {
            document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        function updatePlayerCount(delta) {
            numPlayers = Math.max(2, Math.min(8, numPlayers + delta));
            playerCountDisplay.innerText = numPlayers;
            broadcastLobbyUpdate(); 
        }

        function handleResize() {
            const container = document.getElementById('game-container');
            width = container.clientWidth;
            height = container.clientHeight;

            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            ctx.scale(dpr, dpr);

            const margin = 20;
            const availableWidth = width - (margin * 2);
            // Modified to add extra bottom margin so the grid doesn't block the new bottom banner
            const availableHeight = height - (margin * 2) - 80;

            const cellW = availableWidth / cols;
            const cellH = availableHeight / rows;

            cellSize = Math.min(cellW, cellH);

            const gridW = cols * cellSize;
            const gridH = rows * cellSize;
            ctx.translate((width - gridW) / 2, (height - gridH) / 2);

            canvas.offsetX = (width - gridW) / 2;
            canvas.offsetY = (height - gridH) / 2;
        }

        function startGame(isFromHostBroadcast) {
            if (typeof isFromHostBroadcast !== 'boolean') {
                isFromHostBroadcast = false;
            }

            if (myPlayerId === 0 && isFromHostBroadcast === false && connectedPlayersCount < 2) {
                return; 
            }

            if (myPlayerId === 0 && isFromHostBroadcast === false) {
                socket.emit('hostStartedGame', {
                    roomId: ROOM_ID,
                    rows: nextRows,
                    cols: nextCols,
                    numPlayers: numPlayers
                });
            }

            rows = nextRows;
            cols = nextCols;
            
            handleResize();

            menuOverlay.classList.add('hidden');
            gameControls.classList.remove('hidden');

            players = [];
            for (let i = 0; i < numPlayers; i++) {
                // Ensure names successfully transfer into the physics logic
                let pName = lobbyPlayers[i] ? lobbyPlayers[i].name : `Player ${i+1}`;
                
                players.push({
                    id: i,
                    name: pName, 
                    color: COLORS[i].main,
                    glow: COLORS[i].glow,
                    alive: true,
                    timeLimit: 15 
                });
            }

            grid = [];
            for (let r = 0; r < rows; r++) {
                let row = [];
                for (let c = 0; c < cols; c++) {
                    let capacity = 0;
                    if (r > 0) capacity++;
                    if (r < rows - 1) capacity++;
                    if (c > 0) capacity++;
                    if (c < cols - 1) capacity++;

                    row.push({
                        r, c,
                        count: 0,
                        owner: null,
                        capacity: capacity
                    });
                }
                grid.push(row);
            }

            currentPlayerIndex = 0;
            totalMoves = 0;
            gameActive = true;
            checkWinCondition = false;
            projectiles = [];
            moveHistory = []; 
            eliminationQueue = [];
            isShowingElimination = false;
            updateUndoUI();
            startTimer(); 
        }

        function resetGameMenu() {
            gameActive = false;
            winnerOverlay.classList.add('hidden');
            menuOverlay.classList.remove('hidden');
            gameControls.classList.add('hidden');
            undoBtn.disabled = true;
            eliminationPopup.classList.add('hidden');
        }

        function saveState() {
            const gridCopy = grid.map(row => row.map(cell => ({ ...cell })));
            const playersCopy = players.map(p => ({ ...p }));

            const state = {
                grid: gridCopy,
                players: playersCopy,
                currentPlayerIndex,
                totalMoves,
                checkWinCondition
            };

            moveHistory.push(state);
            if (moveHistory.length > 50) moveHistory.shift(); 
            updateUndoUI();
        }
        
        function undoMove(isFromServer) {
            if (typeof isFromServer !== 'boolean') {
                isFromServer = false;
            }

            if (isAnimating || moveHistory.length === 0 || !gameActive) return;

            const previousState = moveHistory.pop();

            grid = previousState.grid;
            players = previousState.players;
            currentPlayerIndex = previousState.currentPlayerIndex;
            totalMoves = previousState.totalMoves;
            checkWinCondition = previousState.checkWinCondition;

            updateUndoUI();
            startTimer(); 

            if (isFromServer === false && socket) {
                socket.emit('requestUndo', { roomId: ROOM_ID });
            }
        }

        function updateUndoUI() {
            undoBtn.disabled = moveHistory.length === 0 || isAnimating;
            undoBtn.style.opacity = (moveHistory.length === 0 || isAnimating) ? '0.3' : '1';
        }

        function updateTurnIndicator() {
            const indicator = document.getElementById('turnIndicator');
            
            if (!gameActive || isAnimating) {
                indicator.classList.add('hidden');
                return;
            }

            const p = players[currentPlayerIndex];
            if (p) {
                indicator.style.backgroundColor = p.color;
                indicator.style.boxShadow = `0 0 20px ${p.glow}`;
                indicator.style.color = (p.id === 2 || p.id === 5) ? 'black' : 'white'; 
                
                const displaySeconds = Math.max(0, currentSeconds);

                if (currentPlayerIndex === myPlayerId) {
                    indicator.innerText = `YOUR TURN (${displaySeconds}s)`;
                } else {
                    // NEW: Display the actual player's name
                    const displayName = p.name.length > 12 ? p.name.substring(0, 10) + '...' : p.name;
                    indicator.innerText = `${displayName.toUpperCase()}'S TURN (${displaySeconds}s)`;
                }
                
                indicator.classList.remove('hidden');
            }
        }

        function startTimer() {
            clearInterval(turnTimer); 
            if (!gameActive || isAnimating) return;

            currentSeconds = players[currentPlayerIndex].timeLimit;
            updateTurnIndicator(); 

            turnTimer = setInterval(() => {
                currentSeconds--;
                updateTurnIndicator();

                if (currentSeconds === 0) {
                    if (currentPlayerIndex === myPlayerId && socket) {
                        clearInterval(turnTimer);
                        socket.emit('timeoutSkip', { roomId: ROOM_ID });
                        processTimeout();
                    }
                } 
                else if (currentSeconds < 0) {
                    const backupTriggerTime = -3 - myPlayerId; 
                    
                    if (currentSeconds === backupTriggerTime) {
                        clearInterval(turnTimer);
                        console.log(`Active player completely disconnected! Player ${myPlayerId} is forcing the skip.`);
                        if (socket) {
                            socket.emit('timeoutSkip', { roomId: ROOM_ID });
                            processTimeout();
                        }
                    }
                }
            }, 1000); 
        }

        function processTimeout() {
            clearInterval(turnTimer);
            if (!gameActive || isAnimating) return;

            let p = players[currentPlayerIndex];
            if (p.timeLimit === 15) p.timeLimit = 10;
            else if (p.timeLimit === 10) p.timeLimit = 5;

            nextTurn();
            startTimer();
        }

        function handleInput(e) {
            if (!gameActive || isAnimating) return;
            
            if (currentPlayerIndex !== myPlayerId) {
                console.log("Not your turn!");
                return; 
            }

            if (e.type === 'touchstart') e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

            const x = clientX - rect.left - canvas.offsetX;
            const y = clientY - rect.top - canvas.offsetY;

            if (x < 0 || y < 0) return;

            const c = Math.floor(x / cellSize);
            const r = Math.floor(y / cellSize);

            if (r >= 0 && r < rows && c >= 0 && c < cols) {
                attemptMove(r, c);
            }
        }

        function attemptMove(r, c) {
            const cell = grid[r][c];

            if (cell.owner === null || cell.owner === currentPlayerIndex) {
                socket.emit('makeMove', { roomId: ROOM_ID, r: r, c: c });
                processMove(r, c);
            }
        }

        function processMove(r, c) {
            clearInterval(turnTimer); 
            
            const cell = grid[r][c];
            
            players[currentPlayerIndex].timeLimit = 15; 
            
            saveState(); 
            cell.owner = currentPlayerIndex;
            cell.count++;
            totalMoves++;

            updateUndoUI(); 
            resolveState();
        }

        function resolveState() {
            if (checkWinCondition) {
                const activeOwners = new Set();
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (grid[r][c].owner !== null) {
                            activeOwners.add(grid[r][c].owner);
                        }
                    }
                }

                if (activeOwners.size === 1) {
                    isAnimating = false;
                    projectiles = []; 
                    const winnerId = activeOwners.values().next().value;
                    declareWinner(winnerId);
                    return; 
                }
            }

            let unstable = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c].count >= grid[r][c].capacity) {
                        unstable.push(grid[r][c]);
                    }
                }
            }

            if (unstable.length > 0) {
                isAnimating = true;
                clearInterval(turnTimer); 
                updateUndoUI(); 
                updateTurnIndicator();

                unstable.forEach(cell => {
                    cell.count -= cell.capacity;
                    if (cell.count === 0) cell.owner = null;
                    explodeCell(cell);
                });

            } else {
                isAnimating = false;
                updateUndoUI(); 

                if (checkWinCondition) {
                    checkEliminations();
                }

                if (gameActive) {
                    nextTurn();
                    startTimer(); 
                }
            }
        }

        function checkEliminations() {
            if (!gameActive) return;

            const orbCounts = new Array(numPlayers).fill(0);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c].owner !== null) {
                        orbCounts[grid[r][c].owner]++;
                    }
                }
            }

            players.forEach(p => {
                if (p.alive && orbCounts[p.id] === 0) {
                    p.alive = false;
                    eliminationQueue.push(p.id);
                }
            });

            processEliminationQueue();
        }

        function processEliminationQueue() {
            if (isShowingElimination || eliminationQueue.length === 0) return;

            isShowingElimination = true;
            const playerId = eliminationQueue.shift();
            showEliminationPopup(playerId);
        }

        function showEliminationPopup(playerId) {
            const p = players[playerId];
            // NEW: Displays Player Name for elimination
            eliminationText.innerText = `${p.name.toUpperCase()} ELIMINATED`;
            eliminationText.style.color = p.main;
            eliminationPopup.style.borderColor = p.main;
            eliminationPopup.style.boxShadow = `0 0 30px ${p.glow}`;

            eliminationPopup.classList.remove('hidden');
            eliminationPopup.classList.remove('animate-elimination'); 
            void eliminationPopup.offsetWidth; 
            eliminationPopup.classList.add('animate-elimination');

            setTimeout(() => {
                eliminationPopup.classList.add('hidden');
                isShowingElimination = false;
                if (eliminationQueue.length > 0) {
                    processEliminationQueue();
                }
            }, 1000);
        }

        function explodeCell(cell) {
            const neighbors = [
                { r: cell.r - 1, c: cell.c },
                { r: cell.r + 1, c: cell.c },
                { r: cell.r, c: cell.c - 1 },
                { r: cell.r, c: cell.c + 1 }
            ];

            neighbors.forEach(n => {
                if (n.r >= 0 && n.r < rows && n.c >= 0 && n.c < cols) {
                    projectiles.push({
                        startX: cell.c * cellSize + cellSize / 2,
                        startY: cell.r * cellSize + cellSize / 2,
                        targetR: n.r,
                        targetC: n.c,
                        targetX: n.c * cellSize + cellSize / 2,
                        targetY: n.r * cellSize + cellSize / 2,
                        progress: 0,
                        owner: currentPlayerIndex
                    });
                }
            });
        }

        function nextTurn() {
            if (!checkWinCondition && totalMoves >= numPlayers) {
                checkWinCondition = true;
            }

            let loopCount = 0;
            do {
                currentPlayerIndex = (currentPlayerIndex + 1) % numPlayers;
                loopCount++;
            } while (!players[currentPlayerIndex].alive && loopCount < numPlayers + 1);

        }

        function declareWinner(playerId) {
            gameActive = false;
            clearInterval(turnTimer); 
            const p = players[playerId];
            
            // NEW: Displays actual player name on win screen
            winnerText.innerText = `${p.name.toUpperCase()} WON!`;
            winnerIcon.style.backgroundColor = p.color;
            winnerIcon.style.color = 'black'; 
            winnerIcon.style.borderColor = p.color;
            winnerIcon.style.boxShadow = `0 0 50px ${p.glow}`;
            winnerOverlay.classList.remove('hidden');
            undoBtn.disabled = true;
            updateTurnIndicator();
        }

        function gameLoop() {
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            if (!gameActive && projectiles.length === 0) {
                if (grid.length > 0) {
                    drawGrid();
                }
                requestAnimationFrame(gameLoop);
                return;
            }

            drawHighlights(); 
            drawGrid();
            updateAndDrawProjectiles();

            requestAnimationFrame(gameLoop);
        }

        function drawHighlights() {
            if (!gameActive) return;

            const activePlayer = players[currentPlayerIndex];
            if (!activePlayer) return;

            ctx.fillStyle = activePlayer.main;
            ctx.globalAlpha = 0.15; 

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = grid[r][c];
                    if (cell.owner === currentPlayerIndex) {
                        ctx.fillRect(cell.c * cellSize, cell.r * cellSize, cellSize, cellSize);
                    }
                }
            }

            ctx.globalAlpha = 1.0; 
        }

        function drawGrid() {
            ctx.lineWidth = isThickGrid ? 3 : 1;

            if (gameActive && players[currentPlayerIndex]) {
                const c = players[currentPlayerIndex].color;
                ctx.strokeStyle = c;
                ctx.globalAlpha = isThickGrid ? 0.6 : 0.4;
                ctx.shadowBlur = 10; 
                ctx.shadowColor = c;
            } else {
                ctx.strokeStyle = '#333';
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;
            }

            ctx.beginPath();
            for (let r = 0; r <= rows; r++) {
                ctx.moveTo(0, r * cellSize);
                ctx.lineTo(cols * cellSize, r * cellSize);
            }
            for (let c = 0; c <= cols; c++) {
                ctx.moveTo(c * cellSize, 0);
                ctx.lineTo(c * cellSize, rows * cellSize);
            }
            ctx.stroke();

            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    drawCell(grid[r][c]);
                }
            }
        }

        function drawCell(cell) {
            if (cell.count === 0) return;

            let cx = cell.c * cellSize + cellSize / 2;
            let cy = cell.r * cellSize + cellSize / 2;

            if (cell.count === cell.capacity - 1) {
                const shakeIntensity = cellSize * 0.05; 
                cx += (Math.random() - 0.5) * shakeIntensity;
                cy += (Math.random() - 0.5) * shakeIntensity;
            }

            const color = players[cell.owner].color;

            ctx.fillStyle = color;

            if (cell.owner === currentPlayerIndex) {
                ctx.shadowBlur = 30;
                ctx.shadowColor = color;
            } else {
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
            }

            const time = Date.now() * 0.002;
            const offset = (cell.r * cols + cell.c) * 0.5;
            const orbSize = cellSize * ORB_RADIUS_RATIO;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(time + offset);

            if (cell.count === 1) {
                ctx.beginPath();
                ctx.arc(0, 0, orbSize, 0, Math.PI * 2);
                ctx.fill();
            } else if (cell.count === 2) {
                ctx.beginPath();
                ctx.arc(-orbSize, 0, orbSize, 0, Math.PI * 2);
                ctx.arc(orbSize, 0, orbSize, 0, Math.PI * 2);
                ctx.fill();
            } else if (cell.count >= 3) {
                for (let i = 0; i < 3; i++) {
                    const angle = (Math.PI * 2 / 3) * i;
                    const dist = orbSize;
                    ctx.beginPath();
                    ctx.arc(Math.cos(angle) * dist, Math.sin(angle) * dist, orbSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function updateAndDrawProjectiles() {
            if (projectiles.length === 0) return;

            let arrivalOccurred = false;

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.progress += ANIMATION_SPEED;

                if (p.progress >= 1) {
                    const targetCell = grid[p.targetR][p.targetC];
                    targetCell.owner = p.owner;
                    targetCell.count++;

                    projectiles.splice(i, 1);
                    arrivalOccurred = true;
                } else {
                    const currX = p.startX + (p.targetX - p.startX) * p.progress;
                    const currY = p.startY + (p.targetY - p.startY) * p.progress;

                    ctx.fillStyle = players[p.owner].color;
                    ctx.shadowColor = players[p.owner].color; 
                    ctx.shadowBlur = 20; 
                    ctx.beginPath();
                    ctx.arc(currX, currY, cellSize * 0.15, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            if (arrivalOccurred && projectiles.length === 0) {
                setTimeout(() => {
                    resolveState();
                }, 50);
            }
        }
    </script>
